kind = "web"
previewPath = "/"
title = "Clothing Stock Manager"
version = "1.0.0"
id = "artifacts/clothing-stock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19613

[services.development]
run = "pnpm --filter @workspace/clothing-stock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clothing-stock", "run", "build" ]
publicDir = "artifacts/clothing-stock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19613"
BASE_PATH = "/"
